version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Berlin"
    labels:
      - dependencies
      - ci

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:20"
      timezone: "Europe/Berlin"
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 5
