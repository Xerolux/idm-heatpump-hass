name: Apply Web Binary Integration

on:
  push:
    branches:
      - feat/web-binary-sensors-v2

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web-binary-sensors-v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Apply focused source and translation edits
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          sensor_path = Path("custom_components/idm_heatpump/sensor.py")
          sensor = sensor_path.read_text(encoding="utf-8")
          import_anchor = "from .versions import RuntimeVersions, async_runtime_versions\n"
          import_line = "from .web_binary_sensors import WEB_BINARY_VALUE_KEYS\n"
          if import_line not in sensor:
              sensor = sensor.replace(import_anchor, import_anchor + import_line)

          loop_anchor = "    for key in (*_WEB_VALUE_NAMES, *_WEB_ONLY_EXTRA_VALUE_NAMES):\n        if key in modbus_register_names:\n"
          loop_replacement = "    for key in (*_WEB_VALUE_NAMES, *_WEB_ONLY_EXTRA_VALUE_NAMES):\n        if key in WEB_BINARY_VALUE_KEYS:\n            continue\n        if key in modbus_register_names:\n"
          if loop_replacement not in sensor:
              if loop_anchor not in sensor:
                  raise RuntimeError("Could not find web sensor loop anchor")
              sensor = sensor.replace(loop_anchor, loop_replacement)
          sensor_path.write_text(sensor, encoding="utf-8")

          english = {
              "compressor_1": "Compressor 1 (Web)",
              "compressor_heating": "Compressor heater (Web)",
              "dewpoint_humidity_alarm": "Dew point humidity alarm (Web)",
              "ew_evu_lock_contact": "Utility lock contact (Web)",
              "ext_hotwater_signal": "External hot water request (Web)",
              "external_request": "External request (Web)",
              "failure_eheating": "Electric heater fault (Web)",
              "flow_pump_on": "Flow pump (Web)",
              "heat_generator_2nd": "Second heat generator (Web)",
              "heat_generator_2nd_3rd": "Second or third heat generator (Web)",
              "high_pressure_error": "High-pressure fault (Web)",
              "hotwater_circulation_pump": "Hot water circulation pump (Web)",
              "hotwater_station_flow_switch": "Hot water station flow switch (Web)",
              "pump_heating_circuitA": "Heating circuit A pump (Web)",
              "siphon_heating": "Siphon heater (Web)",
          }
          german = {
              "compressor_1": "Verdichter 1 (Web)",
              "compressor_heating": "Verdichterheizung (Web)",
              "dewpoint_humidity_alarm": "Taupunkt-Feuchtealarm (Web)",
              "ew_evu_lock_contact": "EVU-Sperrkontakt (Web)",
              "ext_hotwater_signal": "Externe Warmwasseranforderung (Web)",
              "external_request": "Externe Anforderung (Web)",
              "failure_eheating": "Störung E-Heizung (Web)",
              "flow_pump_on": "Durchflusspumpe (Web)",
              "heat_generator_2nd": "Zweiter Wärmeerzeuger (Web)",
              "heat_generator_2nd_3rd": "Zweiter oder dritter Wärmeerzeuger (Web)",
              "high_pressure_error": "Hochdruckstörung (Web)",
              "hotwater_circulation_pump": "Warmwasser-Zirkulationspumpe (Web)",
              "hotwater_station_flow_switch": "Warmwasserstation Strömungsschalter (Web)",
              "pump_heating_circuitA": "Pumpe Heizkreis A (Web)",
              "siphon_heating": "Siphonheizung (Web)",
          }

          for path, names in (
              (Path("custom_components/idm_heatpump/strings.json"), english),
              (Path("custom_components/idm_heatpump/translations/en.json"), english),
              (Path("custom_components/idm_heatpump/translations/de.json"), german),
          ):
              data = json.loads(path.read_text(encoding="utf-8"))
              binary = data.setdefault("entity", {}).setdefault("binary_sensor", {})
              for key, name in names.items():
                  binary[f"web_{key}"] = {"name": name}
              path.write_text(
                  json.dumps(data, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          test_path = Path("tests/test_web_binary_sensors.py")
          tests = test_path.read_text(encoding="utf-8")
          duplicate_test = '''\n\ndef test_binary_web_values_are_not_created_as_regular_sensors():\n    from custom_components.idm_heatpump.sensor import _web_sensor_definitions\n\n    coordinator = _coordinator(\n        {\n            "compressor_1": IdmWebSensorValue("Ein", 1.0),\n            "high_pressure_error": IdmWebSensorValue("Aus", 0.0),\n            "hotgas_temperature": IdmWebSensorValue("72.5°C", 72.5, "°C"),\n        }\n    )\n    coordinator._registers = []\n\n    keys = {definition.key for definition in _web_sensor_definitions(coordinator)}\n\n    assert "compressor_1" not in keys\n    assert "high_pressure_error" not in keys\n    assert "hotgas_temperature" in keys\n'''
          if "test_binary_web_values_are_not_created_as_regular_sensors" not in tests:
              test_path.write_text(tests.rstrip() + duplicate_test + "\n", encoding="utf-8")

          changelog = Path("docs/changelog.d/136.md")
          changelog.write_text(
              """## Navigator-Webzustände als Binary-Sensoren\n\n"
              "### Added\n\n"
              "- Verdichter-, Pumpen-, Anforderungs-, Sperr- und Störzustände aus dem optionalen Navigator-Webzugriff werden als echte Binary-Sensoren ausgegeben.\n"
              "- Passende Home-Assistant-Geräteklassen für laufende Aggregate, Heizanforderungen, Sperren und Störungen.\n"
              "- Deutsche und englische Entitätsübersetzungen für alle neuen Web-Binary-Sensoren.\n\n"
              "### Changed\n\n"
              "- Boolesche Webwerte werden nicht mehr zusätzlich als normale Sensoren angelegt.\n"
              "- Unbekannte oder mehrdeutige Webwerte bleiben `unavailable`, anstatt einen Betriebszustand zu erfinden.\n"
              """,
              encoding="utf-8",
          )
          PY
      - name: Format Python
        run: |
          python -m pip install ruff==0.14.14
          ruff format custom_components tests
      - name: Commit generated edits
        run: |
          if git diff --quiet; then
            echo "No generated changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests docs/changelog.d/136.md
          git commit -m "feat: integrate translated web binary sensors"
          git push origin HEAD:feat/web-binary-sensors-v2
