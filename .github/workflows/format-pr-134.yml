name: Format PR 134

on:
  push:
    branches:
      - feat/heatpump-entity-optimizations

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/heatpump-entity-optimizations
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install ruff==0.14.14
      - name: Apply Ruff formatting
        run: ruff format custom_components tests
      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            echo "No formatting changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "style: apply ruff formatter"
          git push origin HEAD:feat/heatpump-entity-optimizations
