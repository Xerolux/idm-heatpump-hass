name: Fix PR 142 Tests

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Apply remaining test fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          hierarchy_path = Path("custom_components/idm_heatpump/device_hierarchy.py")
          hierarchy = hierarchy_path.read_text(encoding="utf-8")
          old = '''    entity_keys = {register.name for register in coordinator._registers}\n    entity_keys.update(coordinator.web_value_keys)\n'''
          new = '''    entity_keys = {register.name for register in coordinator._registers}\n    supplement = coordinator.web_supplement\n    sensor_values = getattr(supplement, "sensor_values", None)\n    if isinstance(sensor_values, dict):\n        entity_keys.update(str(key) for key in sensor_values)\n'''
          if old not in hierarchy:
              raise RuntimeError("Expected web-value block not found")
          hierarchy_path.write_text(hierarchy.replace(old, new, 1), encoding="utf-8")

          test_path = Path("tests/test_config_flow.py")
          tests = test_path.read_text(encoding="utf-8")
          tests = tests.replace(
              "        assert IdmHeatpumpConfigFlow.MINOR_VERSION == 2\n",
              "        assert IdmHeatpumpConfigFlow.MINOR_VERSION == 3\n",
              1,
          )
          test_path.write_text(tests, encoding="utf-8")
          PY
      - name: Validate and format
        run: |
          python -m pip install ruff==0.14.14
          ruff check custom_components tests --fix
          ruff format custom_components tests
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "fix: complete device hierarchy regression tests"
          git push origin HEAD:feat/device-hierarchy-opt-in
