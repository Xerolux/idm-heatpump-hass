name: Apply Device Hierarchy

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Apply focused integration edits
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f"Anchor not found in {path}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          # Coordinator option and runtime property.
          replace_once(
              "custom_components/idm_heatpump/coordinator.py",
              "        web_variant: str | None = None,\n    ) -> None:\n",
              "        web_variant: str | None = None,\n        device_hierarchy_enabled: bool = False,\n    ) -> None:\n",
          )
          replace_once(
              "custom_components/idm_heatpump/coordinator.py",
              "        self._web_variant = web_variant if web_variant in (\"nav10\", \"nav20\") else None\n",
              "        self._web_variant = web_variant if web_variant in (\"nav10\", \"nav20\") else None\n        self._device_hierarchy_enabled = device_hierarchy_enabled\n",
          )
          replace_once(
              "custom_components/idm_heatpump/coordinator.py",
              "    @property\n    def model_name(self) -> str:\n",
              "    @property\n    def device_hierarchy_enabled(self) -> bool:\n        \"\"\"Return whether entities should be organized into subdevices.\"\"\"\n        return self._device_hierarchy_enabled\n\n    @property\n    def model_name(self) -> str:\n",
          )

          # Register-backed entities inherit scoped device placement.
          replace_once(
              "custom_components/idm_heatpump/entity.py",
              "from .coordinator import IdmCoordinator\n",
              "from .coordinator import IdmCoordinator\nfrom .device_hierarchy import build_subdevice_info\n",
          )
          replace_once(
              "custom_components/idm_heatpump/entity.py",
              "        self._attr_unique_id = build_entity_unique_id(entry_id, reg.name)\n\n    async def _async_write_register",
              "        self._attr_unique_id = build_entity_unique_id(entry_id, reg.name)\n\n    @property\n    def device_info(self) -> DeviceInfo:\n        \"\"\"Return a subdevice only when hierarchy mode is enabled.\"\"\"\n        return build_subdevice_info(self.coordinator, self._register.name) or build_device_info(self.coordinator)\n\n    async def _async_write_register",
          )

          # Climate entities use their mode-register scope without changing IDs.
          replace_once(
              "custom_components/idm_heatpump/climate.py",
              "from .coordinator import IdmCoordinator\n",
              "from .coordinator import IdmCoordinator\nfrom .device_hierarchy import build_subdevice_info\nfrom .entity import build_device_info\n",
          )
          replace_once(
              "custom_components/idm_heatpump/climate.py",
              "        from .entity import build_device_info\n\n        self._attr_device_info = build_device_info(coordinator)\n",
              "        self._attr_device_info = build_subdevice_info(coordinator, mode_reg.name) or build_device_info(coordinator)\n",
          )

          # Optional web entities follow the same heating-circuit scope where known.
          replace_once(
              "custom_components/idm_heatpump/sensor.py",
              "from .entity import (\n    IdmCoordinatorEntityBase,\n    IdmEntity,\n    build_entity_unique_id,\n    should_add_entity,\n)\n",
              "from .entity import (\n    IdmCoordinatorEntityBase,\n    IdmEntity,\n    build_device_info,\n    build_entity_unique_id,\n    should_add_entity,\n)\nfrom .device_hierarchy import build_subdevice_info\n",
          )
          replace_once(
              "custom_components/idm_heatpump/sensor.py",
              "    @property\n    def available(self) -> bool:\n        if not super().available:\n",
              "    @property\n    def device_info(self):\n        return build_subdevice_info(self.coordinator, self._definition.key) or build_device_info(self.coordinator)\n\n    @property\n    def available(self) -> bool:\n        if not super().available:\n",
          )
          replace_once(
              "custom_components/idm_heatpump/web_binary_sensors.py",
              "from .coordinator import IdmCoordinator\nfrom .entity import IdmCoordinatorEntityBase, build_entity_unique_id\n",
              "from .coordinator import IdmCoordinator\nfrom .device_hierarchy import build_subdevice_info\nfrom .entity import IdmCoordinatorEntityBase, build_device_info, build_entity_unique_id\n",
          )
          replace_once(
              "custom_components/idm_heatpump/web_binary_sensors.py",
              "    def _normalized_value(self) -> bool | None:\n",
              "    @property\n    def device_info(self):\n        return build_subdevice_info(self.coordinator, self._definition.key) or build_device_info(self.coordinator)\n\n    def _normalized_value(self) -> bool | None:\n",
          )

          # Config-entry option, migration safety, and coordinator wiring.
          init_path = Path("custom_components/idm_heatpump/__init__.py")
          init = init_path.read_text(encoding="utf-8")
          init = init.replace(
              "    CONF_DETECTED_WEB_VARIANT,\n",
              "    CONF_DETECTED_WEB_VARIANT,\n    CONF_DEVICE_HIERARCHY,\n",
              1,
          )
          init = init.replace(
              "    DEFAULT_ENABLE_CASCADE,\n",
              "    DEFAULT_DEVICE_HIERARCHY,\n    DEFAULT_ENABLE_CASCADE,\n",
              1,
          )
          init = init.replace(
              "    web_scan_interval: int,\n) -> bool:\n",
              "    web_scan_interval: int,\n    device_hierarchy_enabled: bool,\n) -> bool:\n",
              1,
          )
          init = init.replace(
              "        web_variant=stored_web_variant,\n    )\n",
              "        web_variant=stored_web_variant,\n        device_hierarchy_enabled=device_hierarchy_enabled,\n    )\n",
              1,
          )
          migration_pattern = re.compile(
              r"async def async_migrate_entry\(.*?\n\nasync def async_setup_entry",
              flags=re.DOTALL,
          )
          migration = '''async def async_migrate_entry(hass: HomeAssistant, entry: IdmConfigEntry) -> bool:\n    """Migrate entity IDs and preserve existing device placement safely."""\n    if entry.version != 1:\n        return True\n    if entry.minor_version >= 3:\n        return True\n\n    if entry.minor_version < 2:\n        entity_registry = er.async_get(hass)\n        for entity in er.async_entries_for_config_entry(entity_registry, entry.entry_id):\n            match = _LEGACY_ENTITY_UNIQUE_ID.fullmatch(entity.unique_id)\n            if match is None:\n                continue\n            new_unique_id = f"{entry.entry_id}_{match.group('entity_key')}"\n            entity_registry.async_update_entity(entity.entity_id, new_unique_id=new_unique_id)\n\n    options = dict(entry.options)\n    if entry.minor_version < 3 and CONF_DEVICE_HIERARCHY not in options:\n        # Existing users keep the previous single-device layout until they\n        # explicitly opt in. New entries default to the hierarchy in the flow.\n        options[CONF_DEVICE_HIERARCHY] = False\n\n    hass.config_entries.async_update_entry(\n        entry,\n        unique_id=None,\n        options=options,\n        version=1,\n        minor_version=3,\n    )\n    return True\n\n\nasync def async_setup_entry'''
          init, count = migration_pattern.subn(migration, init, count=1)
          if count != 1:
              raise RuntimeError("Could not replace async_migrate_entry")
          init = init.replace(
              "    hide_unused = entry.options.get(CONF_HIDE_UNUSED, DEFAULT_HIDE_UNUSED)\n",
              "    hide_unused = entry.options.get(CONF_HIDE_UNUSED, DEFAULT_HIDE_UNUSED)\n    device_hierarchy_enabled = bool(\n        entry.options.get(CONF_DEVICE_HIERARCHY, DEFAULT_DEVICE_HIERARCHY)\n    )\n",
              1,
          )
          init = init.replace(
              "            hass, entry, host, port, slave_id, scan_interval, web_pin, web_host, web_scan_interval\n",
              "            hass,\n            entry,\n            host,\n            port,\n            slave_id,\n            scan_interval,\n            web_pin,\n            web_host,\n            web_scan_interval,\n            device_hierarchy_enabled,\n",
              1,
          )
          init = init.replace(
              "            web_variant=runtime_web_variant,\n        )\n",
              "            web_variant=runtime_web_variant,\n            device_hierarchy_enabled=device_hierarchy_enabled,\n        )\n",
              1,
          )
          init_path.write_text(init, encoding="utf-8")

          flow_path = Path("custom_components/idm_heatpump/config_flow.py")
          flow = flow_path.read_text(encoding="utf-8")
          flow = flow.replace(
              "    CONF_DETECTED_WEB_VARIANT,\n",
              "    CONF_DETECTED_WEB_VARIANT,\n    CONF_DEVICE_HIERARCHY,\n",
              1,
          )
          flow = flow.replace(
              "    DEFAULT_ENABLE_CASCADE,\n",
              "    DEFAULT_DEVICE_HIERARCHY,\n    DEFAULT_ENABLE_CASCADE,\n",
              1,
          )
          flow = flow.replace("    MINOR_VERSION = 2\n", "    MINOR_VERSION = 3\n", 1)
          feature_anchor = '''                        vol.Required(\n                            CONF_TECHNICIAN_CODES,\n                            default=options.get(CONF_TECHNICIAN_CODES, False),\n                        ): BooleanSelector(BooleanSelectorConfig()),\n'''
          hierarchy_field = '''                        vol.Required(\n                            CONF_DEVICE_HIERARCHY,\n                            default=options.get(CONF_DEVICE_HIERARCHY, DEFAULT_DEVICE_HIERARCHY),\n                        ): BooleanSelector(BooleanSelectorConfig()),\n'''
          if hierarchy_field not in flow:
              if feature_anchor not in flow:
                  raise RuntimeError("Could not find features schema anchor")
              flow = flow.replace(feature_anchor, hierarchy_field + feature_anchor, 1)
          flow_path.write_text(flow, encoding="utf-8")

          # Add English and German option strings.
          translations = (
              (Path("custom_components/idm_heatpump/strings.json"), "Organize heating circuits and zones as devices", "Creates separate Home Assistant devices for heating circuits, zone modules, and rooms. Existing installations keep the previous layout until this option is enabled."),
              (Path("custom_components/idm_heatpump/translations/en.json"), "Organize heating circuits and zones as devices", "Creates separate Home Assistant devices for heating circuits, zone modules, and rooms. Existing installations keep the previous layout until this option is enabled."),
              (Path("custom_components/idm_heatpump/translations/de.json"), "Heizkreise und Zonen als Geräte organisieren", "Erstellt getrennte Home-Assistant-Geräte für Heizkreise, Zonenmodule und Räume. Bestehende Installationen behalten die bisherige Ansicht, bis diese Option aktiviert wird."),
          )
          for path, label, description in translations:
              data = json.loads(path.read_text(encoding="utf-8"))
              features = data["config"]["step"]["options"]["sections"]["features"]
              features["data"]["device_hierarchy"] = label
              features["data_description"]["device_hierarchy"] = description
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Format Python
        run: |
          python -m pip install ruff==0.14.14
          ruff format custom_components
      - name: Commit generated edits
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components
          git commit -m "feat: wire opt-in device hierarchy"
          git push origin HEAD:feat/device-hierarchy-opt-in
