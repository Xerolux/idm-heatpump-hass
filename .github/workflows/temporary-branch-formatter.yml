name: Temporary Branch Formatter

on:
  push:
    branches:
      - feat/entity-aware-polling

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/entity-aware-polling
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install -q ruff
      - run: ruff format custom_components/idm_heatpump tests
      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/idm_heatpump tests
          git commit -m "style: format entity-aware polling"
          git push origin HEAD:feat/entity-aware-polling
