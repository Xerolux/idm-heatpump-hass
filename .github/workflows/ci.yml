name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published, prereleased]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        home-assistant-version:
          - "2026.2.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Home Assistant ${{ matrix.home-assistant-version }}
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install homeassistant==${{ matrix.home-assistant-version }}
          pip install "aiohttp>=3.8.0"

      - name: Install dev dependencies
        run: |
          pip install ruff mypy pytest pytest-cov pytest-asyncio
          # Kein Versions-Pin: Releases >=0.13.317 verlangen Python >=3.14,
          # die Matrix testet aber auch 3.13 — pip wählt die passende Version.
          pip install pytest-homeassistant-custom-component
          # idm-heatpump-api 0.3.2 ist noch nicht auf PyPI — bis zum Release
          # Fallback auf den 0.3.2-Stand im Library-Repo (Commit-Pin).
          # TODO: Fallback entfernen, sobald 0.3.2 auf PyPI veröffentlicht ist.
          pip install "idm-heatpump-api>=0.3.2" || pip install "idm-heatpump-api @ git+https://github.com/Xerolux/idm-heatpump-api.git@9f091ebaa2a072bbc010428bc946b2f55ac39abd"

      - name: Lint with Ruff
        run: |
          ruff check custom_components/idm_heatpump/ \
            --line-length=120 \
            --output-format=github

      - name: Format check with Ruff
        run: |
          ruff format custom_components/idm_heatpump/ --check

      - name: Type check with mypy
        run: |
          mypy custom_components/idm_heatpump/ \
            --strict \
            --ignore-missing-imports \
            --allow-untyped-globals \
            --allow-subclassing-any

      - name: Run Unit Tests
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=custom_components/idm_heatpump \
            --cov-report=xml \
            --cov-report=term-missing

  hacs:
    runs-on: ubuntu-latest
    name: HACS Validation
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
          ignore: description topics

  hassfest:
    runs-on: ubuntu-latest
    name: Hassfest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest Action
        uses: home-assistant/actions/hassfest@master
