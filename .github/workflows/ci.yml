name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
        home-assistant-version:
          - "2026.5.0"
        api-dependency-mode:
          - manifest-pinned
          - api-main
    uses: ./.github/workflows/python-quality.yml
    with:
      python-version: ${{ matrix.python-version }}
      home-assistant-version: ${{ matrix.home-assistant-version }}
      api-dependency-mode: ${{ matrix.api-dependency-mode }}

  hacs:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: HACS Validation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: HACS Action
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa
        with:
          category: integration
          ignore: description topics

  hassfest:
    runs-on: ubuntu-latest
    name: Hassfest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Hassfest Action
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c
