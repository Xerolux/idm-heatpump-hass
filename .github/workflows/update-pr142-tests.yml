name: Update PR 142 Tests

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Update migration expectations
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_init.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "from custom_components.idm_heatpump.const import MODEL\n",
              "from custom_components.idm_heatpump.const import CONF_DEVICE_HIERARCHY, MODEL\n",
          )
          text = text.replace(
              '        entry.minor_version = 1\n\n        legacy_entity',
              '        entry.minor_version = 1\n        entry.options = {}\n\n        legacy_entity',
          )
          text = text.replace(
              '        entry.minor_version = 0\n        registry = MagicMock()\n',
              '        entry.minor_version = 0\n        entry.options = {}\n        registry = MagicMock()\n',
          )
          text = text.replace(
              "            unique_id=None,\n            version=1,\n            minor_version=2,\n",
              "            unique_id=None,\n            options={CONF_DEVICE_HIERARCHY: False},\n            version=1,\n            minor_version=3,\n",
          )
          text = text.replace(
              "        entry.minor_version = 2\n\n        assert await async_migrate_entry",
              "        entry.minor_version = 3\n\n        assert await async_migrate_entry",
          )
          path.write_text(text, encoding="utf-8")
          PY
      - name: Format tests
        run: |
          python -m pip install ruff==0.14.14
          ruff check tests/test_init.py tests/test_device_hierarchy.py --fix
          ruff format tests/test_init.py tests/test_device_hierarchy.py
      - name: Commit test updates
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests
          git commit -m "test: preserve existing device layout during migration"
          git push origin HEAD:feat/device-hierarchy-opt-in
