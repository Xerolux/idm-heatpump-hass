name: Harden PR 143 Platforms

on:
  push:
    branches:
      - feat/operation-cycle-analysis

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/operation-cycle-analysis
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Apply compatibility fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in (
              Path("custom_components/idm_heatpump/sensor.py"),
              Path("custom_components/idm_heatpump/binary_sensor.py"),
          ):
              text = path.read_text(encoding="utf-8")
              text = text.replace(
                  "entry.runtime_data.operation_analysis,\n",
                  'getattr(entry.runtime_data, "operation_analysis", None),\n',
              )
              path.write_text(text, encoding="utf-8")

          path = Path("custom_components/idm_heatpump/operation_entities.py")
          text = path.read_text(encoding="utf-8")
          old = '''        attributes: dict[str, Any] = {\n            "recording_scope": "observed_since_feature_activation",\n            "compressor_counting_method": "aggregate_any_compressor_off_to_on",\n        }\n        if self._definition.key.startswith("analysis_compressor"):\n            attributes["completed_cycles_used_for_average"] = len(\n                self._analysis.completed_cycle_durations\n            )\n'''
          new = '''        attributes: dict[str, Any] = {\n            "recording_scope": "observed_since_feature_activation",\n        }\n        if self._definition.source == "compressor":\n            attributes["compressor_counting_method"] = (\n                "aggregate_any_compressor_off_to_on"\n            )\n            attributes["completed_cycles_used_for_average"] = len(\n                self._analysis.completed_cycle_durations\n            )\n'''
          if old not in text:
              raise RuntimeError("Operation attribute block not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Format and lint
        run: |
          python -m pip install ruff==0.14.14
          ruff check custom_components tests --fix
          ruff format custom_components tests
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "fix: keep operation platforms runtime-compatible"
          git push origin HEAD:feat/operation-cycle-analysis
