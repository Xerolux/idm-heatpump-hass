name: Capture PR 134 Tests

on:
  push:
    branches:
      - feat/heatpump-entity-optimizations

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/heatpump-entity-optimizations
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install test environment
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "homeassistant==2026.5.0" "aiohttp>=3.8.0"
          pip install ruff mypy pytest pytest-cov pytest-asyncio pytest-homeassistant-custom-component
          python - <<'PY'
          import json
          import subprocess
          import sys

          with open("custom_components/idm_heatpump/manifest.json", encoding="utf-8") as manifest_file:
              requirements = json.load(manifest_file)["requirements"]
          subprocess.check_call([sys.executable, "-m", "pip", "install", *requirements])
          PY
      - name: Capture test output
        run: |
          pytest tests/ -v --tb=short --cov=custom_components/idm_heatpump --cov-report=term-missing > pytest-failures.txt 2>&1 || true
      - name: Commit test output
        run: |
          if git diff --quiet -- pytest-failures.txt && git ls-files --error-unmatch pytest-failures.txt >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pytest-failures.txt
          git commit -m "test: capture PR 134 failures"
          git push origin HEAD:feat/heatpump-entity-optimizations
