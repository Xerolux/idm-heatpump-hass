name: Rename PR 143 Cycles

on:
  push:
    branches:
      - feat/operation-cycle-analysis

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/operation-cycle-analysis
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Rename aggregate cycle entities
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "analysis_compressor_starts_recorded": "analysis_heat_pump_cycles_recorded",
              "analysis_compressor_starts_today": "analysis_heat_pump_cycles_today",
              "analysis_compressor_starts_2h": "analysis_heat_pump_cycles_2h",
              "analysis_compressor_starts_4h": "analysis_heat_pump_cycles_4h",
              "Verdichterstarts erfasst": "Wärmepumpentakte erfasst",
              "Verdichterstarts heute": "Wärmepumpentakte heute",
              "Verdichterstarts letzte 2 Stunden": "Wärmepumpentakte letzte 2 Stunden",
              "Verdichterstarts letzte 4 Stunden": "Wärmepumpentakte letzte 4 Stunden",
          }
          for path in (
              Path("custom_components/idm_heatpump/operation_entities.py"),
              Path("tests/test_operation_entities.py"),
          ):
              text = path.read_text(encoding="utf-8")
              for old, new in replacements.items():
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")
          PY
      - name: Format and lint
        run: |
          python -m pip install ruff==0.14.14
          ruff check custom_components tests --fix
          ruff format custom_components tests
      - name: Commit rename
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "fix: name aggregate compressor transitions as heat-pump cycles"
          git push origin HEAD:feat/operation-cycle-analysis
