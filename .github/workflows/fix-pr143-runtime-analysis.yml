name: Fix PR 143 Runtime Analysis

on:
  push:
    branches:
      - feat/operation-cycle-analysis

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/operation-cycle-analysis
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Require an actual tracker instance
        run: |
          python - <<'PY'
          from pathlib import Path

          entities_path = Path("custom_components/idm_heatpump/operation_entities.py")
          entities = entities_path.read_text(encoding="utf-8")
          anchor = '''def operation_sensor_entities(\n    coordinator: IdmCoordinator,\n    analysis: OperationAnalysis | None,\n) -> list[IdmOperationSensor]:\n'''
          helper = '''def runtime_operation_analysis(runtime_data: Any) -> OperationAnalysis | None:\n    """Return only a real tracker, never a truthy MagicMock or legacy placeholder."""\n    analysis = getattr(runtime_data, "operation_analysis", None)\n    return analysis if isinstance(analysis, OperationAnalysis) else None\n\n\n'''
          if "def runtime_operation_analysis" not in entities:
              if anchor not in entities:
                  raise RuntimeError("Operation entity factory anchor not found")
              entities = entities.replace(anchor, helper + anchor, 1)
          entities_path.write_text(entities, encoding="utf-8")

          sensor_path = Path("custom_components/idm_heatpump/sensor.py")
          sensor = sensor_path.read_text(encoding="utf-8")
          sensor = sensor.replace(
              "from .operation_entities import IdmOperationSensor, operation_sensor_entities\n",
              "from .operation_entities import (\n    IdmOperationSensor,\n    operation_sensor_entities,\n    runtime_operation_analysis,\n)\n",
              1,
          )
          sensor = sensor.replace(
              'getattr(entry.runtime_data, "operation_analysis", None),\n',
              "runtime_operation_analysis(entry.runtime_data),\n",
              1,
          )
          sensor_path.write_text(sensor, encoding="utf-8")

          binary_path = Path("custom_components/idm_heatpump/binary_sensor.py")
          binary = binary_path.read_text(encoding="utf-8")
          binary = binary.replace(
              "from .operation_entities import IdmShortCycleBinarySensor, short_cycle_binary_entities\n",
              "from .operation_entities import (\n    IdmShortCycleBinarySensor,\n    runtime_operation_analysis,\n    short_cycle_binary_entities,\n)\n",
              1,
          )
          binary = binary.replace(
              'getattr(entry.runtime_data, "operation_analysis", None),\n',
              "runtime_operation_analysis(entry.runtime_data),\n",
              1,
          )
          binary_path.write_text(binary, encoding="utf-8")

          test_path = Path("tests/test_operation_entities.py")
          tests = test_path.read_text(encoding="utf-8")
          tests = tests.replace(
              "    operation_sensor_entities,\n",
              "    operation_sensor_entities,\n    runtime_operation_analysis,\n",
              1,
          )
          if "from custom_components.idm_heatpump.operation_analysis import OperationAnalysis\n" not in tests:
              tests = tests.replace(
                  "from custom_components.idm_heatpump.coordinator import IdmCoordinator\n",
                  "from custom_components.idm_heatpump.coordinator import IdmCoordinator\nfrom custom_components.idm_heatpump.operation_analysis import OperationAnalysis\n",
                  1,
              )
          additions = '''\n\ndef test_runtime_tracker_rejects_truthy_placeholder() -> None:\n    runtime_data = MagicMock()\n    runtime_data.operation_analysis = MagicMock()\n\n    assert runtime_operation_analysis(runtime_data) is None\n\n\ndef test_runtime_tracker_accepts_real_instance() -> None:\n    runtime_data = MagicMock()\n    analysis = object.__new__(OperationAnalysis)\n    runtime_data.operation_analysis = analysis\n\n    assert runtime_operation_analysis(runtime_data) is analysis\n'''
          if "test_runtime_tracker_rejects_truthy_placeholder" not in tests:
              test_path.write_text(tests.rstrip() + additions + "\n", encoding="utf-8")
          PY
      - name: Format and lint
        run: |
          python -m pip install ruff==0.14.14
          ruff check custom_components tests --fix
          ruff format custom_components tests
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "fix: create analysis entities only for real trackers"
          git push origin HEAD:feat/operation-cycle-analysis
