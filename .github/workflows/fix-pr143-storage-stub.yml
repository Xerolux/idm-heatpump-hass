name: Fix PR 143 Storage Stub

on:
  push:
    branches:
      - feat/operation-cycle-analysis

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/operation-cycle-analysis
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Add storage helper stub
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/conftest.py")
          text = path.read_text(encoding="utf-8")
          anchor = '''    # homeassistant.helpers.update_coordinator\n    update_coordinator_mod = _make_module("homeassistant.helpers.update_coordinator")\n'''
          block = '''    # homeassistant.helpers.storage\n    storage_mod = _make_module("homeassistant.helpers.storage")\n    helpers.storage = storage_mod\n\n    class _Store:\n        def __init__(self, hass, version, key):\n            self.hass = hass\n            self.version = version\n            self.key = key\n            self.data = None\n\n        def __class_getitem__(cls, item):\n            return cls\n\n        async def async_load(self):\n            return self.data\n\n        async def async_save(self, data):\n            self.data = data\n\n        def async_delay_save(self, data_func, delay):\n            self.data = data_func()\n\n    storage_mod.Store = _Store\n\n    # homeassistant.helpers.update_coordinator\n    update_coordinator_mod = _make_module("homeassistant.helpers.update_coordinator")\n'''
          if "class _Store:" not in text:
              if anchor not in text:
                  raise RuntimeError("Home Assistant helper anchor not found")
              path.write_text(text.replace(anchor, block, 1), encoding="utf-8")
          PY
      - name: Format and lint
        run: |
          python -m pip install ruff==0.14.14
          ruff check tests --fix
          ruff format tests
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests
          git commit -m "test: stub Home Assistant storage helper"
          git push origin HEAD:feat/operation-cycle-analysis
