name: Capture PR 142 Ruff

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install ruff==0.14.14
      - name: Capture Ruff output
        run: ruff check custom_components tests > ruff-pr-142.txt 2>&1 || true
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ruff-pr-142.txt
          git commit -m "test: capture PR 142 ruff output"
          git push origin HEAD:feat/device-hierarchy-opt-in
