name: Python Quality

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      home-assistant-version:
        required: true
        type: string
      api-dependency-mode:
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Python ${{ inputs.python-version }} / HA ${{ inputs.home-assistant-version }} / ${{ inputs.api-dependency-mode }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install test environment
        run: |
          python -m pip install -q --upgrade pip setuptools wheel
          pip install -q "homeassistant==${{ inputs.home-assistant-version }}" "aiohttp>=3.8.0"
          pip install -q pytest pytest-asyncio pytest-homeassistant-custom-component
          python - <<'PY'
          import json
          import subprocess
          import sys
          with open("custom_components/idm_heatpump/manifest.json", encoding="utf-8") as file:
              requirements = json.load(file)["requirements"]
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", *requirements])
          PY
          if [ "${{ inputs.api-dependency-mode }}" = "api-main" ]; then
            pip install -q --upgrade "pymodbus>=3.12.1,<4.0" "git+https://github.com/Xerolux/idm-heatpump-api.git@main"
          fi
      - name: Capture full test output
        run: pytest tests/ -q --tb=short > pytest-output.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: polling-pytest-${{ inputs.api-dependency-mode }}
          path: pytest-output.txt
