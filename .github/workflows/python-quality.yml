name: Python Quality

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used for validation
        required: true
        type: string
      home-assistant-version:
        description: Home Assistant version used for validation
        required: true
        type: string
      api-dependency-mode:
        description: Use the manifest pin or the API main branch
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Python ${{ inputs.python-version }} / HA ${{ inputs.home-assistant-version }} / ${{ inputs.api-dependency-mode }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ inputs.python-version }}
      - name: Clone and run concise polling tests
        run: |
          git clone -q --depth=1 --branch feat/entity-aware-polling https://github.com/Xerolux/idm-heatpump-hass.git repo
          cd repo
          python -m pip install -q --upgrade pip setuptools wheel
          pip install -q "homeassistant==${{ inputs.home-assistant-version }}" pytest pytest-asyncio pytest-homeassistant-custom-component
          python - <<'PY'
          import json
          import subprocess
          import sys

          with open("custom_components/idm_heatpump/manifest.json", encoding="utf-8") as file:
              requirements = json.load(file)["requirements"]
          subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", *requirements])
          PY
          if [ "${{ inputs.api-dependency-mode }}" = "api-main" ]; then
            pip install -q --upgrade "pymodbus>=3.12.1,<4.0" "git+https://github.com/Xerolux/idm-heatpump-api.git@main"
          fi
          pytest tests/test_polling_plan.py tests/test_polling_manager.py -q --tb=short
