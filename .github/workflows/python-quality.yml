name: Python Quality

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used for validation
        required: true
        type: string
      home-assistant-version:
        description: Home Assistant version used for validation
        required: true
        type: string
      api-dependency-mode:
        description: Use the manifest pin or the API main branch
        required: true
        type: string

permissions:
  contents: write

jobs:
  fix:
    if: inputs.api-dependency-mode == 'manifest-pinned'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/entity-aware-polling
          fetch-depth: 0
      - name: Apply compatibility fix and restore CI workflows
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("custom_components/idm_heatpump/polling_plan.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "from homeassistant.core import Event, HomeAssistant, callback\n",
              "from homeassistant.core import HomeAssistant, callback\n",
              1,
          )
          text = text.replace(
              "    def _handle_registry_event(self, event: Event) -> None:\n",
              "    def _handle_registry_event(self, event: Any) -> None:\n",
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY
          git fetch origin main
          git show origin/main:.github/workflows/python-quality.yml > .github/workflows/python-quality.yml
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install -q ruff
      - run: ruff format custom_components/idm_heatpump/polling_plan.py
      - name: Commit final fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/idm_heatpump/polling_plan.py .github/workflows/python-quality.yml .github/workflows/ci.yml
          git commit -m "fix: avoid hard Event type dependency in polling manager"
          git push origin HEAD:feat/entity-aware-polling
