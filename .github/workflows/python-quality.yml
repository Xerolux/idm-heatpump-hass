name: Python Quality

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used for validation
        required: true
        type: string
      home-assistant-version:
        description: Home Assistant version used for validation
        required: true
        type: string
      api-dependency-mode:
        description: Use the manifest pin or the API main branch
        required: true
        type: string

permissions:
  contents: write

jobs:
  format:
    if: inputs.api-dependency-mode == 'manifest-pinned'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/entity-aware-polling
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install -q ruff
      - run: ruff format custom_components/idm_heatpump tests
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/idm_heatpump tests
          git commit -m "style: format entity-aware polling"
          git push origin HEAD:feat/entity-aware-polling
