name: Fix PR 142 Review Findings

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Apply review fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          init_path = Path("custom_components/idm_heatpump/__init__.py")
          init = init_path.read_text(encoding="utf-8")
          repeated = (
              "    device_hierarchy_enabled = bool("
              "entry.options.get(CONF_DEVICE_HIERARCHY, DEFAULT_DEVICE_HIERARCHY))\n"
          )
          while init.count(repeated) > 1:
              init = init.replace(repeated + repeated, repeated, 1)
          init_path.write_text(init, encoding="utf-8")

          flow_path = Path("custom_components/idm_heatpump/config_flow.py")
          flow = flow_path.read_text(encoding="utf-8")
          broken = (
              "                        vol.Required(\n"
              "                            default=options.get(CONF_DEVICE_HIERARCHY, DEFAULT_DEVICE_HIERARCHY),\n"
              "                        ): BooleanSelector(BooleanSelectorConfig()),\n"
          )
          fixed = (
              "                        vol.Required(\n"
              "                            CONF_DEVICE_HIERARCHY,\n"
              "                            default=options.get(CONF_DEVICE_HIERARCHY, DEFAULT_DEVICE_HIERARCHY),\n"
              "                        ): BooleanSelector(BooleanSelectorConfig()),\n"
          )
          if broken not in flow:
              raise RuntimeError("Broken hierarchy option field not found")
          flow_path.write_text(flow.replace(broken, fixed, 1), encoding="utf-8")
          PY
      - name: Validate and format
        run: |
          python -m pip install ruff==0.14.14
          ruff check custom_components tests --fix
          ruff format custom_components tests
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "fix: correct hierarchy option wiring"
          git push origin HEAD:feat/device-hierarchy-opt-in
