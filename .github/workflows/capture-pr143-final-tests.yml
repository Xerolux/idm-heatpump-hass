name: Capture Final PR 143 Tests

on:
  push:
    branches:
      - feat/operation-cycle-analysis

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/operation-cycle-analysis
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install test environment
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "homeassistant==2026.5.0" pytest pytest-asyncio pytest-cov pytest-homeassistant-custom-component
          python - <<'PY'
          import json
          import subprocess
          import sys

          with open("custom_components/idm_heatpump/manifest.json", encoding="utf-8") as file:
              requirements = json.load(file)["requirements"]
          subprocess.check_call([sys.executable, "-m", "pip", "install", *requirements])
          PY
      - name: Capture failures
        run: pytest tests/ -q --tb=short > pytest-pr143-final.txt 2>&1 || true
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pytest-pr143-final.txt
          git commit -m "test: capture final PR 143 failures"
          git push origin HEAD:feat/operation-cycle-analysis
