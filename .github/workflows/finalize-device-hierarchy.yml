name: Finalize Device Hierarchy

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Add strict return annotations
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in (
              Path("custom_components/idm_heatpump/sensor.py"),
              Path("custom_components/idm_heatpump/web_binary_sensors.py"),
          ):
              text = path.read_text(encoding="utf-8")
              text = text.replace("    def device_info(self):\n", "    def device_info(self) -> Any:\n")
              path.write_text(text, encoding="utf-8")
          PY
      - name: Format changed Python
        run: |
          python -m pip install ruff==0.14.14
          ruff format custom_components tests
      - name: Commit changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "typing: finalize opt-in device hierarchy"
          git push origin HEAD:feat/device-hierarchy-opt-in
