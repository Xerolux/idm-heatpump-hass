name: Apply PR 142 Cleanup

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Wire cleanup after platform setup
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("custom_components/idm_heatpump/__init__.py")
          text = path.read_text(encoding="utf-8")
          import_anchor = "from .coordinator import IdmCoordinator, navigator_family\n"
          import_line = "from .device_hierarchy import cleanup_stale_hierarchy_devices\n"
          if import_line not in text:
              text = text.replace(import_anchor, import_anchor + import_line, 1)

          web_anchor = "    await hass.config_entries.async_forward_entry_setups(entry, [Platform.SENSOR])\n"
          web_replacement = (
              web_anchor
              + "    cleanup_stale_hierarchy_devices(hass, coordinator)\n"
          )
          if web_replacement not in text:
              text = text.replace(web_anchor, web_replacement, 1)

          normal_anchor = "        await hass.config_entries.async_forward_entry_setups(entry, PLATFORMS)\n"
          normal_replacement = (
              normal_anchor
              + "        cleanup_stale_hierarchy_devices(hass, coordinator)\n"
          )
          if normal_replacement not in text:
              text = text.replace(normal_anchor, normal_replacement, 1)

          path.write_text(text, encoding="utf-8")
          PY
      - name: Format and lint
        run: |
          python -m pip install ruff==0.14.14
          ruff check custom_components tests --fix
          ruff format custom_components tests
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "feat: remove stale hierarchy devices safely"
          git push origin HEAD:feat/device-hierarchy-opt-in
