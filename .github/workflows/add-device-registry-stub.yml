name: Add Device Registry Stub

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Extend Home Assistant test stub
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/conftest.py")
          text = path.read_text(encoding="utf-8")
          anchor = "    device_registry_mod.DeviceInfo = _DeviceInfo\n"
          addition = '''    device_registry_mod.DeviceInfo = _DeviceInfo\n\n    class _DeviceRegistry:\n        def __init__(self):\n            self.devices = {}\n\n        def async_update_device(self, device_id, **kwargs):\n            return None\n\n    device_registry_mod.async_get = MagicMock(return_value=_DeviceRegistry())\n    device_registry_mod.async_entries_for_config_entry = lambda registry, entry_id: [\n        device\n        for device in registry.devices.values()\n        if entry_id in getattr(device, "config_entries", set())\n    ]\n'''
          if "class _DeviceRegistry" not in text:
              if anchor not in text:
                  raise RuntimeError("DeviceInfo stub anchor not found")
              text = text.replace(anchor, addition, 1)
              path.write_text(text, encoding="utf-8")
          PY
      - name: Format and lint tests
        run: |
          python -m pip install ruff==0.14.14
          ruff check tests --fix
          ruff format tests
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests
          git commit -m "test: support device registry cleanup"
          git push origin HEAD:feat/device-hierarchy-opt-in
