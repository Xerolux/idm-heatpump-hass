name: Harden PR 143 Analysis

on:
  push:
    branches:
      - feat/operation-cycle-analysis

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/operation-cycle-analysis
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Apply semantic hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          analysis_path = Path("custom_components/idm_heatpump/operation_analysis.py")
          text = analysis_path.read_text(encoding="utf-8")
          helper_anchor = '''def _finite_non_negative(value: Any) -> float | None:\n    """Return a finite non-negative number."""\n    if isinstance(value, bool) or not isinstance(value, (int, float)):\n        return None\n    numeric = float(value)\n    if numeric < 0 or numeric != numeric or numeric in (float("inf"), float("-inf")):\n        return None\n    return numeric\n'''
          helper_replacement = helper_anchor + '''\n\ndef _non_negative_int(value: Any) -> int:\n    """Return a persisted non-negative integer or zero for malformed data."""\n    if isinstance(value, bool):\n        return 0\n    try:\n        numeric = int(value)\n    except (TypeError, ValueError):\n        return 0\n    return max(0, numeric)\n'''
          if "def _non_negative_int" not in text:
              if helper_anchor not in text:
                  raise RuntimeError("Numeric helper anchor missing")
              text = text.replace(helper_anchor, helper_replacement, 1)
          text = text.replace(
              "        self.short_cycle_minutes = short_cycle_minutes\n",
              "        self.short_cycle_minutes = max(5, min(60, int(short_cycle_minutes)))\n",
              1,
          )
          text = text.replace(
              '        self.total_compressor_starts = max(0, int(stored.get("total_compressor_starts", 0)))\n        self.total_defrost_starts = max(0, int(stored.get("total_defrost_starts", 0)))\n',
              '        self.total_compressor_starts = _non_negative_int(\n            stored.get("total_compressor_starts")\n        )\n        self.total_defrost_starts = _non_negative_int(\n            stored.get("total_defrost_starts")\n        )\n',
              1,
          )
          text = text.replace(
              "        if self._compressor_on is not True or self.current_cycle_started is None:\n            return None\n",
              "        if not self._compressor_reconciled:\n            return None\n        if self._compressor_on is not True or self.current_cycle_started is None:\n            return 0.0\n",
              1,
          )
          analysis_path.write_text(text, encoding="utf-8")

          entities_path = Path("custom_components/idm_heatpump/operation_entities.py")
          entities = entities_path.read_text(encoding="utf-8")
          entities = entities.replace(
              '        name="Zeit seit letzter Abtauung",\n',
              '        name="Zeit seit letztem Abtaustart",\n',
              1,
          )
          entities = entities.replace(
              '            "recording_scope": "observed_since_feature_activation",\n',
              '            "recording_scope": "observed_since_feature_activation",\n            "compressor_counting_method": "aggregate_any_compressor_off_to_on",\n',
              1,
          )
          entities_path.write_text(entities, encoding="utf-8")

          changelog_path = Path("docs/changelog.d/138.md")
          changelog = changelog_path.read_text(encoding="utf-8")
          changelog = changelog.replace(
              "- Neustart-sichere Erfassung beobachteter Verdichterstarts",
              "- Neustart-sichere Erfassung beobachteter Wärmepumpentakte (Übergang von keinem auf mindestens einen aktiven Verdichter)",
              1,
          )
          changelog_path.write_text(changelog, encoding="utf-8")

          test_path = Path("tests/test_operation_analysis.py")
          tests = test_path.read_text(encoding="utf-8")
          additions = '''\n\n@pytest.mark.asyncio\nasync def test_malformed_persisted_counts_are_reset_safely(monkeypatch) -> None:\n    analysis, _store = _analysis(\n        monkeypatch,\n        loaded={\n            "total_compressor_starts": "broken",\n            "total_defrost_starts": None,\n        },\n    )\n\n    await analysis.async_load()\n\n    assert analysis.total_compressor_starts == 0\n    assert analysis.total_defrost_starts == 0\n\n\n@pytest.mark.asyncio\nasync def test_current_cycle_duration_is_zero_while_reconciled_off(monkeypatch) -> None:\n    analysis, _store = _analysis(monkeypatch)\n    await analysis.async_load()\n    now = datetime(2026, 7, 20, 8, 0, tzinfo=UTC)\n\n    analysis.process_snapshot(_snapshot(), set(), now=now)\n\n    assert analysis.current_cycle_minutes(now) == 0.0\n\n\ndef test_short_cycle_threshold_is_clamped(monkeypatch) -> None:\n    fake_store = FakeStore()\n    monkeypatch.setattr(module, "Store", lambda *args, **kwargs: fake_store)\n    analysis = OperationAnalysis(\n        object(),\n        "entry",\n        _registers().get,\n        short_cycle_minutes=999,\n        expected_poll_interval=10,\n    )\n\n    assert analysis.short_cycle_minutes == 60\n'''
          if "test_malformed_persisted_counts_are_reset_safely" not in tests:
              test_path.write_text(tests.rstrip() + additions + "\n", encoding="utf-8")
          PY
      - name: Format and lint
        run: |
          python -m pip install ruff==0.14.14
          ruff check custom_components tests --fix
          ruff format custom_components tests
      - name: Commit hardening
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests docs/changelog.d/138.md
          git commit -m "fix: harden operation analysis persistence and semantics"
          git push origin HEAD:feat/operation-cycle-analysis
