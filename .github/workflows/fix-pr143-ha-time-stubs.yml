name: Fix PR 143 HA Time Stubs

on:
  push:
    branches:
      - feat/operation-cycle-analysis

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/operation-cycle-analysis
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Add time unit and dt stubs
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/conftest.py")
          text = path.read_text(encoding="utf-8")

          time_anchor = '''    class _UnitOfEnergy:\n        KILO_WATT_HOUR = "kWh"\n'''
          time_block = '''    class _UnitOfEnergy:\n        KILO_WATT_HOUR = "kWh"\n\n    class _UnitOfTime:\n        MINUTES = "min"\n'''
          if "class _UnitOfTime" not in text:
              if time_anchor not in text:
                  raise RuntimeError("UnitOfEnergy anchor not found")
              text = text.replace(time_anchor, time_block, 1)

          unit_assignment = "    units.UnitOfEnergy = _UnitOfEnergy\n"
          if "    units.UnitOfTime = _UnitOfTime\n" not in text:
              text = text.replace(
                  unit_assignment,
                  unit_assignment + "    units.UnitOfTime = _UnitOfTime\n",
                  1,
              )

          util_anchor = '    ha.util.json = _make_module("homeassistant.util.json")\n'
          util_block = '''    ha.util.json = _make_module("homeassistant.util.json")\n    ha.util.dt = _make_module("homeassistant.util.dt")\n    ha.util.dt.as_local = lambda value: value.astimezone()\n'''
          if 'ha.util.dt = _make_module("homeassistant.util.dt")' not in text:
              if util_anchor not in text:
                  raise RuntimeError("HA util json anchor not found")
              text = text.replace(util_anchor, util_block, 1)

          path.write_text(text, encoding="utf-8")
          PY
      - name: Format and lint
        run: |
          python -m pip install ruff==0.14.14
          ruff check tests --fix
          ruff format tests
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests
          git commit -m "test: stub Home Assistant time helpers"
          git push origin HEAD:feat/operation-cycle-analysis
