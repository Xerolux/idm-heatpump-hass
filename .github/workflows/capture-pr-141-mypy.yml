name: Capture PR 141 Mypy

on:
  push:
    branches:
      - feat/web-binary-sensors-v2

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web-binary-sensors-v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install type-check environment
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "homeassistant==2026.5.0" mypy
          python - <<'PY'
          import json
          import subprocess
          import sys

          with open("custom_components/idm_heatpump/manifest.json", encoding="utf-8") as manifest_file:
              requirements = json.load(manifest_file)["requirements"]
          subprocess.check_call([sys.executable, "-m", "pip", "install", *requirements])
          PY
      - name: Capture mypy output
        run: |
          mypy --strict --ignore-missing-imports custom_components/idm_heatpump > mypy-pr-141.txt 2>&1 || true
      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mypy-pr-141.txt
          git commit -m "test: capture PR 141 mypy output"
          git push origin HEAD:feat/web-binary-sensors-v2
