name: Fix PR 142 Lint

on:
  push:
    branches:
      - feat/device-hierarchy-opt-in

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/device-hierarchy-opt-in
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Deduplicate generated imports
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in (
              Path("custom_components/idm_heatpump/__init__.py"),
              Path("custom_components/idm_heatpump/config_flow.py"),
          ):
              lines = path.read_text(encoding="utf-8").splitlines()
              seen: set[str] = set()
              cleaned: list[str] = []
              for line in lines:
                  if line.strip() in {"CONF_DEVICE_HIERARCHY,", "DEFAULT_DEVICE_HIERARCHY,"}:
                      if line.strip() in seen:
                          continue
                      seen.add(line.strip())
                  cleaned.append(line)
              path.write_text("\n".join(cleaned) + "\n", encoding="utf-8")

          sensor = Path("custom_components/idm_heatpump/sensor.py")
          text = sensor.read_text(encoding="utf-8")
          if "from typing import Any\n" not in text:
              text = text.replace(
                  "from datetime import timedelta\n",
                  "from datetime import timedelta\nfrom typing import Any\n",
                  1,
              )
          sensor.write_text(text, encoding="utf-8")
          PY
      - name: Apply Ruff fixes and formatting
        run: |
          python -m pip install ruff==0.14.14
          ruff check custom_components tests --fix
          ruff format custom_components tests
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components tests
          git commit -m "style: fix device hierarchy lint"
          git push origin HEAD:feat/device-hierarchy-opt-in
