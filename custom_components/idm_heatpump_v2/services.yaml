set_system_mode:
  name: "Set System Mode"
  description: "Set the operating mode of the heat pump system"
  fields:
    mode:
      name: "Mode"
      description: "System operating mode (e.g. standby, automatik, automatic, urlaub, holiday)"
      required: true
      selector:
        select:
          options:
            - "standby"
            - "automatik"
            - "automatic"
            - "abwesend"
            - "away"
            - "urlaub"
            - "holiday"
            - "nur warmwasser"
            - "hot water only"
            - "nur heizung/kuehlung"
            - "heating/cooling only"

acknowledge_errors:
  name: "Acknowledge Errors"
  description: "Acknowledge/clear active error messages on the heat pump"

write_register:
  name: "Write Register"
  description: "Write a value directly to a Modbus register (advanced use only)"
  fields:
    address:
      name: "Address"
      description: "Modbus register address (decimal)"
      required: true
      selector:
        number:
          min: 0
          max: 10000
          mode: box
    value:
      name: "Value"
      description: "Value to write to the register"
      required: true
      selector:
        text:
          multiline: false
    acknowledge_risk:
      name: "Acknowledge Risk"
      description: "Must be set to true – writing incorrect values can damage your heat pump"
      required: true
      selector:
        constant:
          value: true
