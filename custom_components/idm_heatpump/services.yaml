set_system_mode:
  name: "Set System Mode"
  description: "Set the operating mode of the heat pump system"
  target:
    entity:
      integration: idm_heatpump
  fields:
    mode:
      name: "Mode"
      description: "System operating mode (e.g. standby, automatik, automatic, urlaub, holiday)"
      required: true
      selector:
        select:
          options:
            - "standby"
            - "automatik"
            - "automatic"
            - "abwesend"
            - "away"
            - "urlaub"
            - "holiday"
            - "nur warmwasser"
            - "hot water only"
            - "nur heizung/kuehlung"
            - "heating/cooling only"

acknowledge_errors:
  name: "Acknowledge Errors"
  description: "Acknowledge/clear active error messages on the heat pump"
  target:
    entity:
      integration: idm_heatpump

write_register:
  name: "Write Register"
  description: "Write a value directly to a Modbus register (advanced use only)"
  target:
    entity:
      integration: idm_heatpump
  fields:
    address:
      name: "Address"
      description: "Modbus register address (decimal)"
      required: true
      selector:
        number:
          min: 0
          max: 10000
          mode: box
    value:
      name: "Value"
      description: "Value to write to the register"
      required: true
      selector:
        text:
          multiline: false
    datatype:
      name: "Datatype"
      description: "Modbus datatype (uint16, int16, float, uchar, bool)"
      required: false
      selector:
        select:
          options:
            - "uint16"
            - "int16"
            - "float"
            - "uchar"
            - "bool"
    acknowledge_risk:
      name: "Acknowledge Risk"
      description: "Must be set to true – writing incorrect values can damage your heat pump"
      required: true
      selector:
        constant:
          value: true

set_external_climate:
  name: "Set External Climate"
  description: "Write external room temperature and optional humidity to IDM GLT registers"
  target:
    entity:
      integration: idm_heatpump
  fields:
    heating_circuit:
      name: "Heating Circuit"
      description: "Heating circuit to receive the external room temperature"
      required: true
      selector:
        select:
          options:
            - "A"
            - "B"
            - "C"
            - "D"
            - "E"
            - "F"
            - "G"
    room_temperature:
      name: "Room Temperature"
      description: "External room temperature in °C (-20…60)"
      required: true
      selector:
        number:
          min: -20
          max: 60
          step: 0.1
          unit_of_measurement: "°C"
          mode: box
    humidity:
      name: "Humidity"
      description: "Optional external relative humidity in % (0…100)"
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: "%"
          mode: box

start_dhw_boost:
  name: "Start DHW Boost"
  description: "Temporarily prioritize domestic hot water and restore the exact previous mode and setpoint afterwards"
  fields:
    entry_id:
      name: "Config Entry ID"
      description: "Required only when multiple IDM heat pumps are loaded"
      required: false
      selector:
        text:
    target_temperature:
      name: "Target Temperature"
      description: "Temporary domestic hot-water target in °C"
      default: 60
      required: false
      selector:
        number:
          min: 35
          max: 65
          step: 1
          unit_of_measurement: "°C"
          mode: slider
    timeout_minutes:
      name: "Maximum Runtime"
      description: "Maximum boost duration before automatic restoration"
      default: 60
      required: false
      selector:
        number:
          min: 5
          max: 240
          step: 5
          unit_of_measurement: "min"
          mode: slider

cancel_dhw_boost:
  name: "Cancel DHW Boost"
  description: "Cancel an active boost and restore the exact saved system mode and DHW setpoint"
  fields:
    entry_id:
      name: "Config Entry ID"
      description: "Required only when multiple IDM heat pumps are loaded"
      required: false
      selector:
        text:
