[mypy]
# Strict typing configuration for IDM Heatpump integration
# https://developers.home-assistant.io/docs/core/integration-quality-scale/#-strict-typing

strict = true
ignore_missing_imports = true
allow_untyped_globals = true
allow_subclassing_any = true

# Home Assistant stubs are not always complete
disable_error_code = misc

[mypy-pymodbus.*]
ignore_missing_imports = true

[mypy-voluptuous.*]
ignore_missing_imports = true
